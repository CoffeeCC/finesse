server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;

  # SPA: every route falls back to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Never cache the HTML shell, so new deploys (new asset hashes) take effect
  # on the next load instead of being pinned to a stale, possibly-broken bundle.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Hashed assets can cache forever
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
}
