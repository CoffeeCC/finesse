server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;

  # Finesse is served under /finesse/ behind the Tailscale Funnel (it shares port 10000
  # with Jellyfin, which lives at /). The app is built with base=/finesse/, so the browser
  # always requests /finesse/... . Depending on Tailscale's path handling the backend may
  # receive the request WITH or WITHOUT the /finesse prefix — normalize by stripping a
  # leading /finesse so the files resolve from the web root either way.
  rewrite ^/finesse/(.*)$ /$1 last;
  rewrite ^/finesse$ / last;

  # ---- Request feature: Radarr/Sonarr proxy --------------------------------
  # Lets Finesse's "Request" page search + add titles without exposing the *arr
  # API keys to the browser, without CORS, and working remotely through the funnel.
  # Every call is gated by auth_request, which validates the caller's Jellyfin
  # token against Jellyfin itself — so only logged-in users can request.
  # NOTE: the real X-Api-Key values live ONLY in the host copy of this file
  # (/mnt/HDDs/Applications/finesse/nginx.conf); placeholders here keep keys out of git.

  # Internal token check: 2xx from Jellyfin /Users/Me = allow, 401 = deny.
  location = /arr/_auth {
    internal;
    proxy_pass http://192.168.1.121:8096/Users/Me;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Emby-Token $http_x_emby_token;
  }

  location /arr/radarr/ {
    auth_request /arr/_auth;
    proxy_pass http://192.168.1.121:30025/api/v3/;
    proxy_set_header X-Api-Key "__RADARR_API_KEY__";
    proxy_set_header Authorization "";
  }

  location /arr/sonarr/ {
    auth_request /arr/_auth;
    proxy_pass http://192.168.1.121:30113/api/v3/;
    proxy_set_header X-Api-Key "__SONARR_API_KEY__";
    proxy_set_header Authorization "";
  }

  location /arr/lidarr/ {
    auth_request /arr/_auth;
    proxy_pass http://192.168.1.121:30071/api/v1/;
    proxy_set_header X-Api-Key "__LIDARR_API_KEY__";
    proxy_set_header Authorization "";
  }

  # SABnzbd takes its key as a query param, not a header — append it server-side.
  # Single endpoint: /arr/sab?mode=… → SAB /api?mode=…&apikey=…
  location = /arr/sab {
    auth_request /arr/_auth;
    proxy_pass http://192.168.1.121:30055/api?$args&apikey=__SAB_API_KEY__;
    proxy_set_header Authorization "";
  }
  # ---- Games feature: RomM proxy ------------------------------------------
  # Finesse's "Games" section browses the RomM library and streams ROM files to
  # its embedded EmulatorJS through this proxy, with the RomM credentials injected
  # server-side. Gated by the caller's Jellyfin token — accepted as a header (browse
  # calls) OR a ?token= query arg (EmulatorJS fetches the ROM without headers).
  # NOTE: the real __ROMM_BASIC_AUTH__ (base64 of user:pass) lives ONLY in the host
  # copy of this file; the placeholder here keeps the credential out of git.
  location = /games/_auth {
    internal;
    proxy_pass http://192.168.1.121:8096/Users/Me;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Emby-Token $cookie_finesse_games_token;
    proxy_set_header Authorization $http_authorization;
  }

  location /games/api/ {
    auth_request /games/_auth;
    proxy_pass http://192.168.1.121:30061/api/;
    proxy_set_header Authorization "Basic __ROMM_BASIC_AUTH__";
    proxy_set_header Host $host;
    proxy_buffering off;            # stream large ROM downloads
    proxy_read_timeout 3600s;
    client_max_body_size 0;
  }

  location /games/assets/ {
    auth_request /games/_auth;
    proxy_pass http://192.168.1.121:30061/assets/;
    proxy_set_header Authorization "Basic __ROMM_BASIC_AUTH__";
  }

  # SteamGridDB — box art fallback when RomM hasn't identified a ROM yet.
  # Key lives only in the host copy of this file, not in git.
  location /games/sgdb/ {
    auth_request /games/_auth;
    proxy_pass https://www.steamgriddb.com/api/v2/;
    proxy_set_header Authorization "Bearer __STEAMGRIDDB_API_KEY__";
    proxy_ssl_server_name on;
  }
  # --------------------------------------------------------------------------

  # SPA: every route falls back to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Never cache the HTML shell, so new deploys (new asset hashes) take effect immediately.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Hashed assets can cache forever.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
}
