<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finesse</title>
    <!-- Polyfills for webOS Chromium 68 (LG CX = webOS 5): globalThis (71),
         queueMicrotask (71), Object.fromEntries (73), Array flat/flatMap (69). -->
    <script>
      (function (g) {
        if (!g.globalThis) g.globalThis = g
        if (!g.queueMicrotask) g.queueMicrotask = function (cb) { Promise.resolve().then(cb) }
        if (!Object.fromEntries) Object.fromEntries = function (it) {
          var o = {}
          var arr = Array.from(it)
          for (var i = 0; i < arr.length; i++) o[arr[i][0]] = arr[i][1]
          return o
        }
        if (!Array.prototype.flatMap) Array.prototype.flatMap = function (fn, self) {
          var out = []
          for (var i = 0; i < this.length; i++) {
            var v = fn.call(self, this[i], i, this)
            if (Array.isArray(v)) out.push.apply(out, v)
            else out.push(v)
          }
          return out
        }
        if (!Array.prototype.flat) Array.prototype.flat = function (d) {
          d = d === undefined ? 1 : d
          var out = []
          for (var i = 0; i < this.length; i++) {
            var v = this[i]
            if (Array.isArray(v) && d > 0) out.push.apply(out, v.flat(d - 1))
            else out.push(v)
          }
          return out
        }
      })(typeof window !== 'undefined' ? window : this)
    </script>
    <style>
      html, body { margin: 0; height: 100%; background: #0b0d12; }
      #boot {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        color: #6b7280; font: 500 22px/1.4 Georgia, serif; font-style: italic;
      }
    </style>
  </head>
  <body>
    <!-- Shown only until boot.js swaps in the real app document. -->
    <div id="boot">Finesse</div>
    <!-- baked.js = version metadata; app.js/app.css are the on-disk bundle. -->
    <script src="./baked.js"></script>
    <!-- boot.js loads app.js/app.css, or an OTA bundle from IndexedDB if newer. -->
    <script src="./boot.js"></script>
  </body>
</html>
